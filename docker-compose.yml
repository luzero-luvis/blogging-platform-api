---
services:
  postgres:
    image: postgres:17
    env_file:
      - .db_env
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    ports:
      - 8080:8080
    depends_on:
      - postgres
    restart: unless-stopped
volumes:
  pgdata:
